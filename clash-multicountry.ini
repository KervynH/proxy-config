[custom]

;设置规则标志位
ruleset=!!import:https://raw.githubusercontent.com/KervynH/clash-config/refs/heads/main/snippets/rulesets-full.list
;设置规则标志位

;设置分组标志位
custom_proxy_group=!!import:https://raw.githubusercontent.com/KervynH/clash-config/refs/heads/main/snippets/groups-core-front-multicountry.list
custom_proxy_group=!!import:https://raw.githubusercontent.com/KervynH/clash-config/refs/heads/main/snippets/groups-service-multicountry.list
custom_proxy_group=!!import:https://raw.githubusercontent.com/KervynH/clash-config/refs/heads/main/snippets/groups-core-final.list
custom_proxy_group=!!import:https://raw.githubusercontent.com/KervynH/clash-config/refs/heads/main/snippets/groups-passive-auto.list
custom_proxy_group=!!import:https://raw.githubusercontent.com/KervynH/clash-config/refs/heads/main/snippets/groups-passive-multicountry.list
;设置分组标志位

;自定义emoji标志位
add_emoji=true
remove_old_emoji=true
;;; 导入自定义 emoji
emoji=!!import:https://raw.githubusercontent.com/KervynH/clash-config/refs/heads/main/snippets/emoji.list
;自定义emoji标志位

enable_rule_generator=true
overwrite_original_rules=true

;clash_rule_base=https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/GeneralClashConfig.yml

;luck
